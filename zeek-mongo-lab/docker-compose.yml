version: '3.8'

services:
  # --- MongoDB 服务 ---
  mongodb:
    image: mongo:latest
    container_name: my-mongodb
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: gyf424201
    ports:
      - "62015:27017"
    volumes:
      - ./mongo-data:/data/db

  # --- Zeek 服务 ---
  zeek:
    image: zeek/zeek:latest
    container_name: my-zeek
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ./zeek-logs:/zeek-logs
      - ./pcap:/pcap
    command: tail -f /dev/null

  # --- Neo4j 服务（GYF 项目专用）---
  # 宿主机已有 neo4j-music 占用 7862->7687 / 7863->7474
  # 本实例使用 7865->7687 (Bolt) / 7864->7474 (Browser)
  neo4j-gyf:
    image: neo4j:5.12.0
    container_name: gyf_neo4j
    restart: always
    ports:
      - "7869:7474"   # Neo4j Browser → http://localhost:7864
      - "7865:7687"   # Bolt（rag.py 连接此端口）
    environment:
      - NEO4J_AUTH=neo4j/gyf_password
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_memory_heap_initial__size=512m
      - NEO4J_dbms_memory_heap_max__size=2G
      - NEO4J_dbms_memory_pagecache_size=1G
    volumes:
      - ./neo4j-data:/data
      - ./neo4j-logs:/logs
